<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNB-RU Loading Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Bahnschrift', 'Comic Sans', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            background: #0a0a0a;
        }
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: none;
            transform: none;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            animation: fadeSoft 24s infinite ease-in-out;
            will-change: opacity;
        }

        .slide:nth-child(1) {
            animation-delay: 0s;
            background-image: url('images/1.jpg');
        }
        .slide:nth-child(2) {
            animation-delay: 8s;
            background-image: url('images/2.jpg');
        }
        .slide:nth-child(3) {
            animation-delay: 16s;
            background-image: url('images/3.jpg');
        }   
        .slide:nth-child(4) {
            animation-delay: 24s;
            background-image: url('images/4.jpg');     
        }   
        .slide:nth-child(5) {
            animation-delay: 32s;
            background-image: url('images/5.jpg');     
        }
        .slide:nth-child(6) {
            animation-delay: 40s;
            background-image: url('images/6.jpg');     
        }
        .slide:nth-child(7) {
            animation-delay: 50s;
            background-image: url('images/7.jpg');     
        }
        .slide:nth-child(8) {
            animation-delay: 62s;
            background-image: url('images/8.jpg');     
        }
        .slide:nth-child(9) {
            animation-delay: 70s;
            background-image: url('images/9.jpg');     
        }
        .slide:nth-child(10) {
            animation-delay: 82s;
            background-image: url('images/10.jpg');     
        }
        .slide:nth-child(11) {
            animation-delay: 90s;
            background-image: url('images/11.jpg');     
        }
        .slide:nth-child(12) {
            animation-delay: 104s;
            background-image: url('images/12.jpg');     
        }
        .slide:nth-child(13) {
            animation-delay: 110s;
            background-image: url('images/13.jpg');     
        }
        .slide:nth-child(14) {
            animation-delay: 124s;
            background-image: url('images/14.jpg');     
        }
        .slide:nth-child(15) {
            animation-delay: 130s;
            background-image: url('images/15.jpg');     
        }       

        @keyframes fadeSoft {
            0% { opacity: 0; }
            6% { opacity: 1; }  
            28% { opacity: 1; }   
            36% { opacity: 0; }    
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(175, 0, 0, 0.25) 0%, rgba(255, 0, 0, 0.15) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: none;
        }

        .fade-in-text {
            font-size: 4.5vw;
            font-weight: bold;
            letter-spacing: 5px;
            animation: appearGlow 3.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 0;
            color: white;
            text-shadow: 
                0 0 12px #ffb6c1,
                0 0 25px #ffb6c1,
                0 0 40px #ff69b4,
                0 0 55px #ff69b4,
                0 0 70px #ff1493;
            background-color: rgba(255, 0, 0, 0.2);
            padding: 20px 50px;
            border-radius: 100px;
            border: 2px solid rgba(200, 0, 0, 0.9);
            box-shadow: 
                0 0 25px rgba(155, 0, 0, 0.5),
                0 0 50px rgba(90, 0, 0, 0.3);
            backdrop-filter: none;
            display: inline-block;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        @keyframes appearGlow {
            0% {
                opacity: 0;
                transform: scale(0.7);
                text-shadow: 0 0 0 transparent;
                letter-spacing: 12px;
            }
            35% {
                opacity: 0.95;
                transform: scale(1.05);
                text-shadow: 
                    0 0 25px #ffb6c1,
                    0 0 50px #ff69b4,
                    0 0 75px #ff1493;
                letter-spacing: 6px;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                text-shadow: 
                    0 0 12px #ffb6c1,
                    0 0 28px #ffb6c1,
                    0 0 42px #ff69b4,
                    0 0 56px #ff69b4,
                    0 0 68px #ff1493;
                letter-spacing: 5px;
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 35%, rgba(255, 0, 0, 0.2) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(175, 0, 0, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 95% 15%, rgba(155, 0, 0, 0.12) 0%, transparent 50%);
            pointer-events: none;
            z-index: 4;
        }

        @media (max-width: 680px) {
            .fade-in-text {
                font-size: 8vw;
                padding: 14px 30px;
                letter-spacing: 3px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .slide {
                animation: none;
                opacity: 0;
            }
            .slide:first-child {
                opacity: 1;
            }
            .fade-in-text {
                animation: none;
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <div class="fade-in-text">SNB-RU</div>
    </div>
    
</body>
</html>
